<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>Task Manager</h1>
                <p class="subtitle">Stay organized and productive</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Input Section -->
            <section class="input-section">
                <form id="taskForm" class="task-form">
                    <input
                        type="text"
                        id="taskInput"
                        class="task-input"
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button type="submit" class="btn btn-add">Add Task</button>
                </form>
            </section>

            <!-- Controls Section -->
            <section class="controls-section">
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="pending">Pending</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
                <div class="task-counter">
                    <span id="taskCount" class="counter-text">0</span>
                    <span class="counter-label">tasks left</span>
                </div>
            </section>

            <!-- Task List Section -->
            <section class="tasks-section">
                <div id="taskList" class="task-list">
                    <!-- Tasks will be dynamically inserted here -->
                </div>
                <div id="emptyState" class="empty-state">
                    <p>No tasks yet. Add one to get started! 📝</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Task</h2>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <form id="editForm" class="edit-form">
                <input
                    type="text"
                    id="editInput"
                    class="task-input"
                    placeholder="Task description..."
                    required
                >
                <div class="modal-buttons">
                    <button type="submit" class="btn btn-save">Save Task</button>
                    <button type="button" class="btn btn-cancel" id="cancelEdit">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
